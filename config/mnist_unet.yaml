dataset:
  name: "MNIST"
  data_dir: "data/MNIST"
  image_size: [32, 32]
  open_set_ratio: 0.0

model:
  type: "unet"
  encoder:
    backbone: "mock" # Dùng mock encoder vì ảnh nhỏ 32x32
    latent_dim: 128
    # pretrained: false
  decoder:
    # type: "resnet"
    use_decoder: true
    skip_dropout: 0.2
    # latent_dim: 128
    image_size: [32, 32]
    # hidden_dims: [128, 64, 32]
  verifier:
    hidden_dims: [256, 128]
  projector:
    proj_dim: 64

generation:
  mode: "latent_sampling"
  num_images: 8
  temperature: 10
  output_path: "logs/mnist_latent.png"

losses:
  lambda_id: 1.0
  lambda_con: 0.5
  lambda_pair: 1.0
  lambda_rec: 1.0
  beta_kl: 0.005
  lambda_unc: 0.1

loss_schedules:
  beta_kl:
    type: "linear"
    start_epoch: 0
    end_epoch: 5
    start_value: 0.0
    end_value: 0.005
  lambda_con:
    type: "cyclic"
    start_step: 0
    cycle_length: 50
    min_value: 0.0
    max_value: 1.0
  lambda_rec:
    type: "constant"
    value: 1.0
  lambda_unc:
    type: "constant"
    value: 0.1

training:
  epochs: 20
  batch_size: 32
  num_workers: 2
  learning_rate: 0.001
  weight_decay: 0.0001
  optimizer: "AdamW"
  scheduler: "CosineAnnealingLR"
  log_interval: 10
  save_interval: 1
  device: "cpu" # Default to cpu for testing or specify cuda
  use_sampler: true
  sampler_type: "pk_sampler" # options: pk_sampler, weighted
  sampler_p: 8
  sampler_k: 4

logging:
  log_dir: "logs/experiments"
  experiment_name: "mnist_unet_train"
  enable_tensorboard: true
