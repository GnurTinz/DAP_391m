name: "OwnDataset"
data_dir: "data/scripts/script1"
image_size: [128, 128]
split_mode: "ratio"
hand_filter: "both"
train_ratio: 0.9


transforms:
  random_horizontal_flip: 0.5
  random_rotation: 15
  color_jitter:
    brightness: 0.1
    contrast: 0.1
  random_affine:
    degrees: 0
    translate: [0.1, 0.1]
