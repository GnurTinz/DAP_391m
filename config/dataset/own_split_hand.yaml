name: "OwnDataset"
data_dir: "data/scripts/script1/"
image_size: [128, 128]
split_mode: "hand"
train_hand: "left"
val_hand: "right"


transforms:
  random_grayscale: 0.5
  random_rotation: 15
  color_jitter:
    brightness: 0.2
    contrast: 0.2
  random_affine:
    translate: [0.1, 0.1]
    scale: [0.9, 1.1]
