name: "tongji"
data_dir: "data/Tongji"
image_size: [128, 128]
channels: 3
num_classes: 600

# Chế độ session: session1 làm tập Train, session2 làm tập Val
split_mode: "session"
train_ratio: 0.8
seed: 42


transforms:
  random_horizontal_flip: 0.5
  random_rotation: 15
  color_jitter:
    brightness: 0.1
    contrast: 0.1
  random_affine:
    degrees: 0
    translate: [0.1, 0.1]
