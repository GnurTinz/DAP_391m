name: "iitd"
data_dir: "data/IITD Palmprint V1/Segmented"
image_size: [128, 128]
channels: 3
num_classes: 230 # Giả định IITD có 230 người

# Chế độ hand: Left làm tập Train, Right làm tập Val
split_mode: "hand"
train_ratio: 0.8
seed: 42


transforms:
  random_grayscale: 0.5
  random_rotation: 15
  color_jitter:
    brightness: 0.2
    contrast: 0.2
  random_affine:
    translate: [0.1, 0.1]
    scale: [0.9, 1.1]
