# Cấu hình sử dụng InfoNCE Loss (Phiên bản cơ bản của Contrastive Learning)
contrastive_type: "infonce"
temperature: 0.1

weights:
  lambda_id: 1.0
  lambda_con: 0.5
  lambda_pair: 1.0
  lambda_rec: 1.0
  beta_kl: 0.005
  lambda_unc: 0.1

schedules:
  beta_kl:
    type: "linear"
    start_epoch: 0
    end_epoch: 5
    start_value: 0.0
    end_value: 0.005
  lambda_con:
    type: "cyclic"
    start_step: 0
    cycle_length: 50
    min_value: 0.0
    max_value: 1.0
  lambda_rec:
    type: "constant"
    value: 1.0
  lambda_unc:
    type: "constant"
    value: 0.1
