type: "unet"
encoder:
  backbone: "resnet18" # Trích xuất latent vector bằng ResNet18
  pretrained: true # Sử dụng trọng số ImageNet để hội tụ cực nhanh
  hidden_dims: [32, 64, 128] # (Không dùng cho resnet nhưng để dự phòng nếu switch sang cnn)
  latent_dim: 128
decoder:
  use_decoder: true
  skip_dropout: 0.5
  image_size: ${dataset.image_size} # Interpolate from dataset config
  unet_channels: [64, 128, 256, 512] # Default U-Net channels
verifier:
  hidden_dims: [256, 128]
projector:
  use_mlp: true
  hidden_dims: [128] # Optional, defines intermediate layers
  activation: "LeakyReLU" # Khuyến nghị dùng LeakyReLU cho ArcFace
  proj_dim: 128 # Tăng từ 64 lên 128 để không gian biểu diễn ArcFace rộng hơn
  use_bn: true # Bắt buộc True cho ArcFace
