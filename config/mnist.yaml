dataset:
  name: "MNIST"
  data_dir: "data/MNIST"
  image_size: [32, 32]
  open_set_ratio: 0.0

model:
  encoder:
    backbone: "mock" # Dùng mock encoder vì ảnh nhỏ 32x32
    latent_dim: 128
    pretrained: false
  decoder:
    type: "cnn_base"
    use_decoder: true
    latent_dim: 128
    image_size: [32, 32]
    hidden_dims: [128, 64, 32]
  verifier:
    hidden_dims: [256, 128]
  projector:
    proj_dim: 128

losses:
  lambda_id: 1.0
  lambda_con: 0.5
  lambda_pair: 1.0
  lambda_rec: 1.0
  beta_kl: 0.005
  lambda_unc: 0.1

loss_schedules:
  beta_kl:
    type: "linear"
    start_epoch: 0
    end_epoch: 5
    start_value: 0.0
    end_value: 0.005
  lambda_con:
    type: "step"
    start_epoch: 2
    value: 0.5
  lambda_rec:
    type: "constant"
    value: 1.0
  lambda_unc:
    type: "constant"
    value: 0.1

training:
  epochs: 20
  batch_size: 32
  num_workers: 2
  learning_rate: 0.001
  weight_decay: 0.0001
  optimizer: "AdamW"
  scheduler: "CosineAnnealingLR"
  log_interval: 10
  save_interval: 1
  use_sampler: true
  sampler_type: "random_class" # options: pk_sampler, random_class, weighted
  sampler_num_classes: 4

logging:
  log_dir: "logs/experiments"
  experiment_name: "mnist_vae_train"
  enable_tensorboard: true
