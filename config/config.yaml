defaults:
  - dataset: mnist
  - model: unet
  - training: default
  - losses: default
  - sampling: default
  - loss_schedules: warmup
  - logging: default
  - represent: default
  - _self_

hydra:
  run:
    dir: .
  output_subdir: null
  job_logging:
    handlers:
      file:
        filename: logs/${hydra.job.name}.log

checkpoint: ""
output: "" # Để trống để Python script tự động map vào version_X hoặc logs/unversioned_results
seed: 42

generation:
  mode: "latent_sampling"
  num_images: 8
  temperature: 10
  output_path: "" # Để trống để lưu vào version_X/generated/

