dataset:
  name: "PolyU"
  data_dir: "data/PolyU"
  image_size: [128, 128]
  open_set_ratio: 0.2

model:
  encoder:
    backbone: "resnet18"
    latent_dim: 256
    pretrained: true
  decoder:
    type: "cnn_base"
    use_decoder: true
    latent_dim: 256
    image_size: [128, 128]
    hidden_dims: [128, 64, 32]
  verifier:
    hidden_dims: [512, 256, 128]

losses:
  lambda_id: 1.0
  lambda_con: 0.5
  lambda_pair: 1.0
  lambda_rec: 0.1
  beta_kl: 0.01
  lambda_unc: 0.1

loss_schedules:
  beta_kl:
    type: "linear"
    start_epoch: 0
    end_epoch: 20
    start_value: 0.0
    end_value: 0.01
  lambda_con:
    type: "step"
    start_epoch: 5
    value: 0.5
  lambda_rec:
    type: "constant"
    value: 0.1
  lambda_unc:
    type: "constant"
    value: 0.1

training:
  epochs: 100
  batch_size: 32
  num_workers: 4
  learning_rate: 0.001
  weight_decay: 0.0001
  optimizer: "AdamW"
  scheduler: "CosineAnnealingLR"
  log_interval: 10
  save_interval: 1

sampling:
  method: "monte_carlo" # options: 'monte_carlo', 'hard_negative', 'gaussian_shift'
  num_samples: 10

logging:
  log_dir: "logs/experiments"
  experiment_name: "palmprint_run_v1"
  enable_tensorboard: true

